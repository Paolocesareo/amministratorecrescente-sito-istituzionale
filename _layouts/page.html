---
layout: default
---
<article class="page">
  <header class="page-hero">
    <div class="container">
      {% if page.eyebrow %}<p class="eyebrow">{{ page.eyebrow }}</p>{% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
    </div>
  </header>

  <div class="container page-body">
    {{ content }}
  </div>
</article>
